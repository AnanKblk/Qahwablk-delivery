<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qahwa BLK</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 420px;
      width: 100%;
    }

    .logo {
      width: 220px;
      margin-bottom: 48px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 18px 24px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .btn:active { transform: scale(0.97); }

    .btn-talabat {
      background: #ff6b35;
      color: #fff;
      box-shadow: 0 4px 24px rgba(255, 107, 53, 0.35);
    }

    .btn-talabat:hover {
      box-shadow: 0 6px 32px rgba(255, 107, 53, 0.55);
      transform: translateY(-1px);
    }

    .btn-careem {
      background: #27ae60;
      color: #fff;
      box-shadow: 0 4px 24px rgba(39, 174, 96, 0.3);
    }

    .btn-careem:hover {
      box-shadow: 0 6px 32px rgba(39, 174, 96, 0.5);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">

    <img class="logo" src="White_BLK_Logo_Horizontal.png" alt="Qahwa BLK" />

    <a class="btn btn-talabat" href="https://www.talabat.com/jordan/qahwa-blk" target="_blank" rel="noopener">
      Talabat
    </a>

    <a class="btn btn-careem" href="https://link.careem.com/Gd9eTsAlaxQRH" target="_blank" rel="noopener">
      Careem
    </a>

  </div>
</body>
</html>
